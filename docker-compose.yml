# 通常: .env に DATABASE_URL（Supabase の接続文字列）を設定し、docker compose up で backend + frontend のみ起動。
# ローカル PostgreSQL を使う場合: docker compose --profile local-db up で db も起動。

services:
  db:
    image: postgres:16-alpine
    profiles:
      - local-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: warikan_drive
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      # .env の DATABASE_URL を使用（Supabase 推奨）。未設定で local-db 時はローカル db に接続
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/warikan_drive}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    env_file:
      - .env
    # db は profiles: [local-db] のため、depends_on にするとプロファイルなしで down がエラーになるので省略。
    # ローカル DB 利用時は --profile local-db で db を先に起動し、数秒待ってから backend が接続する。

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 同一オリジンに飛ばしてプロキシで中継（CORS 回避）
        NEXT_PUBLIC_API_BASE_URL: /api/proxy
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  pgdata:
